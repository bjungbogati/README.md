name: "Binod Jung Bogati"
favicon: favicon.ico
title: "Binod Jung Bogati"
description: |
  A blog about Data Science and Machine Learning.
output_dir: "_site"

include: ["_redirects", "robots.txt", "favicon.ico"]
# theme: blog.css
navbar:
  right:
    - text: "Home"
      href: "./"
    - text: "Blogs"
      href: "./posts.html"
    - text: "Skills"
      href: "./#skills"
    - icon: fa fa-rss
      href: posts.xml
  search: false
      
base_url: https://bjungbogati.com.np

# google_analytics: "UA-25716523-3"

collections:
  posts:
    categories: true
    categories_metadata: true
    authors_metadata: false
    share: [twitter, linkedin]
    citations: false
    feed_items_max: 50
    
twitter:
  site: "@bjungbogati"
  creator: "@bjungbogati"

output:
  distill::distill_article:
    css: styles.css
    mathjax: null
    highlight: null
    theme: null
    # includes:
    #   after_body: utterances.html


        
